<head>
<meta charset="UTF-8">

<title>Browse & Learn — Annie Leert Nederlands</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@500;600&display=swap');
:root{--scheldt-blue:#294E72;--brothers-green:#016935;--croissant:#FFA500;--burgundy:#733B40;--castle-grey:#6B6B6B;--charcoal:#1c1d24;--north-country:#A6C5EA;--glencoe:#C0BF87;--bitten-croissant:#F3D6B0;--oat-milk:#F6F7F6;--fog:#CBCAD0;--bg:#F6F7F6;--surface:#fff;--border:#CBCAD0;--ink:#1c1d24;--muted:#6B6B6B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"Source Sans 3",sans-serif;font-weight:300;min-height:100vh;font-size:16px;line-height:1.5;}
/* NAV */
.topnav{background:var(--charcoal);display:flex;align-items:center;gap:0;padding:0 2rem;height:48px;position:sticky;top:0;z-index:20;}
.topnav-home{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;color:var(--oat-milk);text-decoration:none;margin-right:1.5rem;white-space:nowrap;}
.topnav-home em{color:var(--north-country);font-style:italic;}
.topnav-links{display:flex;gap:0;flex:1;}
.topnav-link{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600;color:var(--fog);text-decoration:none;padding:0 1rem;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.topnav-link:hover{color:var(--north-country);}
.topnav-link.active{color:var(--oat-milk);border-bottom-color:var(--north-country);}
/* HEADER */
header{background:var(--charcoal);color:var(--oat-milk);padding:2.2rem 2rem 1.8rem;position:relative;overflow:hidden;}
header::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 20% 50%,rgba(41,78,114,0.25) 0%,transparent 70%);pointer-events:none;}
header h1{font-family:"Playfair Display",serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:700;position:relative;color:var(--oat-milk);}
header h1 em{color:var(--north-country);font-style:italic;}
.header-sub{margin-top:.4rem;font-size:.78rem;letter-spacing:.13em;text-transform:uppercase;color:var(--fog);position:relative;}
/* CONTROLS */
.controls-wrap{background:var(--surface);border-bottom:1.5px solid var(--border);position:sticky;top:48px;z-index:10;box-shadow:0 2px 8px rgba(28,29,36,0.06);}
.controls{max-width:1140px;margin:0 auto;padding:.75rem 2rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:600;margin-right:.3rem;flex-shrink:0;}
.sep{width:1px;height:20px;background:var(--border);margin:0 .4rem;flex-shrink:0;}
.filter-btn{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:.22rem .75rem;border-radius:2rem;font-family:"Source Sans 3",sans-serif;font-size:.76rem;cursor:pointer;transition:all .15s;font-weight:400;white-space:nowrap;}
.filter-btn:hover{border-color:var(--scheldt-blue);color:var(--scheldt-blue);}
.filter-btn.active{background:var(--scheldt-blue);color:var(--oat-milk);border-color:var(--scheldt-blue);font-weight:600;}
/* level filter colours */
.filter-btn[data-filter="A0"].active{background:#4a4a6a;border-color:#4a4a6a;}
.filter-btn[data-filter="A1"].active{background:var(--scheldt-blue);border-color:var(--scheldt-blue);}
.filter-btn[data-filter="A2"].active{background:#1a5c3a;border-color:#1a5c3a;}
.filter-btn[data-filter="B1"].active{background:var(--burgundy);border-color:var(--burgundy);}
.filter-btn[data-filter="B2"].active{background:#5c3d00;border-color:#5c3d00;}
.filter-btn[data-filter="C1"].active{background:#3a1a5c;border-color:#3a1a5c;}
.count{text-align:center;color:var(--muted);font-size:.76rem;padding:.8rem 2rem .3rem;max-width:1140px;margin:0 auto;letter-spacing:.06em;}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;padding:.8rem 2rem 3.5rem;max-width:1140px;margin:0 auto;}
/* CARD */
.card{background:var(--surface);border:1.5px solid var(--border);border-left-width:4px;border-radius:6px;padding:1.2rem 1.3rem 1.1rem;display:flex;flex-direction:column;gap:.5rem;animation:fadeUp .28s ease both;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 4px 18px rgba(41,78,114,0.10);transform:translateY(-2px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card[data-primary="word-order"]{border-left-color:var(--scheldt-blue);}
.card[data-primary="negation"]{border-left-color:var(--burgundy);}
.card[data-primary="tense"]{border-left-color:var(--brothers-green);}
.card[data-primary="modal"]{border-left-color:var(--croissant);}
.card[data-primary="question"]{border-left-color:var(--castle-grey);}
.card[data-primary="subordinate"]{border-left-color:#5c1f26;}
.card[data-primary="preposition"]{border-left-color:#014d27;}
.card[data-primary="adjective"]{border-left-color:#1a3a5c;}
.card[data-primary="pronoun"]{border-left-color:#6b3fa0;}
.card[data-primary="verb"]{border-left-color:#8b4513;}
/* CARD TOP ROW */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:.25rem;flex:1;}
.tag{font-size:.63rem;text-transform:uppercase;letter-spacing:.09em;font-weight:600;padding:.1rem .42rem;border-radius:3px;background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.tag.word-order{background:rgba(166,197,234,0.30);color:var(--scheldt-blue);border-color:rgba(41,78,114,0.25);}
.tag.negation{background:rgba(216,191,216,0.35);color:var(--burgundy);border-color:rgba(115,59,64,0.25);}
.tag.tense{background:rgba(192,191,135,0.35);color:var(--brothers-green);border-color:rgba(1,105,53,0.25);}
.tag.modal{background:rgba(243,214,176,0.50);color:#7a4a10;border-color:rgba(255,165,0,0.35);}
.tag.question{background:rgba(203,202,208,0.45);color:#2e2e3a;border-color:rgba(107,107,107,0.30);}
.tag.subordinate{background:rgba(92,31,38,0.10);color:#5c1f26;border-color:rgba(115,59,64,0.22);}
.tag.preposition{background:rgba(1,105,53,0.10);color:#014d27;border-color:rgba(1,105,53,0.22);}
.tag.adjective{background:rgba(41,78,114,0.10);color:#1a3a5c;border-color:rgba(41,78,114,0.22);}
.tag.pronoun{background:rgba(107,63,160,0.12);color:#6b3fa0;border-color:rgba(107,63,160,0.25);}
.tag.verb{background:rgba(139,69,19,0.10);color:#7a3a0a;border-color:rgba(139,69,19,0.25);}
/* LEVEL BADGE */
.level-badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;padding:.12rem .38rem;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.level-A0{background:#e8e8f0;color:#4a4a6a;border:1px solid #c8c8d8;}
.level-A1{background:rgba(166,197,234,0.35);color:var(--scheldt-blue);border:1px solid rgba(41,78,114,0.25);}
.level-A2{background:rgba(192,191,135,0.40);color:#1a5c3a;border:1px solid rgba(26,92,58,0.25);}
.level-B1{background:rgba(216,191,216,0.40);color:var(--burgundy);border:1px solid rgba(115,59,64,0.25);}
.level-B2{background:rgba(243,214,176,0.50);color:#5c3d00;border:1px solid rgba(92,61,0,0.25);}
.level-C1{background:rgba(107,63,160,0.12);color:#3a1a5c;border:1px solid rgba(58,26,92,0.25);}
.rule-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;font-weight:600;color:var(--muted);}
.dutch{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--charcoal);line-height:1.45;letter-spacing:-.01em;}
.english{font-size:.86rem;color:var(--castle-grey);font-style:italic;font-weight:400;}
.explanation{font-size:.84rem;color:#3a3a44;line-height:1.65;font-weight:400;border-top:1px solid var(--border);padding-top:.55rem;margin-top:.1rem;}
.hl{background:var(--bitten-croissant);border-radius:2px;padding:0 3px;font-weight:600;color:var(--charcoal);font-style:normal;}
/* PATTERN LINK */
.pattern-link{font-size:.7rem;color:var(--scheldt-blue);text-decoration:none;display:inline-flex;align-items:center;gap:.25rem;font-weight:600;letter-spacing:.04em;margin-top:.1rem;opacity:.75;transition:opacity .15s;}
.pattern-link:hover{opacity:1;text-decoration:underline;}
.pattern-link::before{content:"⇢";}
footer{text-align:center;padding:1.6rem 2rem;color:var(--muted);font-size:.76rem;border-top:1px solid var(--border);letter-spacing:.06em;font-style:italic;}
@media(max-width:700px){.grid{padding:.6rem 1rem 2.5rem;gap:.8rem;}.controls{padding:.6rem 1rem;}.topnav-links .topnav-link:not(.active){display:none;}}
</style>
</head>

const LEVELS = ["A0","A1","A2","B1","B2","C1"];
const TOPICS = ["word-order","negation","tense","modal","question","subordinate","preposition","adjective","verb","pronoun"];
const patternTitles = {
  "1":"General statement","2":"Progressive (aan het)","3":"Adjective","8":"Yes/no question",
  "9":"Question word","11":"Past (hebben)","12":"Past (zijn)","13":"Separable/modal cluster",
  "14":"Inversion (V2)","19":"Geen + noun","20":"Niet","28":"Indirect question",
  "29":"want (because)","30":"omdat (because)","31":"dat (that)","32":"als (if/when)",
  "33":"toen (when)","34":"terwijl (while)","35":"zodat (so that)","36":"hoewel (although)",
  "37":"om…te (in order to)","39":"tenzij (unless)","40":"Relative clause"
};

let activeFilter = "all";

function tagClass(t){
  const m={"word-order":"word-order","negation":"negation","tense":"tense","modal":"modal",
    "question":"question","subordinate":"subordinate","preposition":"preposition",
    "adjective":"adjective","pronoun":"pronoun","verb":"verb"};
  return m[t]||"";
}

function getFiltered(){
  if(activeFilter==="all") return sentences;
  if(LEVELS.includes(activeFilter)) return sentences.filter(s=>s.level===activeFilter);
  return sentences.filter(s=>s.tags.includes(activeFilter));
}

function renderCards(){
  const filtered = getFiltered();
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");
  count.textContent = filtered.length+" sentence"+(filtered.length!==1?"s":"");
  grid.innerHTML = "";
  filtered.forEach((s,i)=>{
    const primary = s.tags[0];
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.primary = primary;
    card.style.animationDelay = (i*0.028)+"s";
    const tagsHtml = s.tags.map(t=>`<span class="tag ${tagClass(t)}">${t.replace("-"," ")}</span>`).join("");
    const patTitle = patternTitles[s.patternId] ? patternTitles[s.patternId] : "";
    const patLink = patTitle ? `<a class="pattern-link" href="structures.html#p${s.patternId}" title="See structure pattern">Pattern: ${patTitle}</a>` : "";
    card.innerHTML = `
      <div class="card-top">
        <div class="card-tags">${tagsHtml}</div>
        <span class="level-badge level-${s.level}">${s.level}</span>
      </div>
      <div class="rule-label">${s.rule}</div>
      <div class="dutch">${s.dutch}</div>
      <div class="english">${s.english}</div>
      <div class="explanation">${s.explanation}</div>
      ${patLink}
    `;
    grid.appendChild(card);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

// Handle URL param ?filter=xxx
const urlParams = new URLSearchParams(window.location.search);
const urlFilter = urlParams.get("filter");
if(urlFilter){
  const btn = document.querySelector(`.filter-btn[data-filter="${urlFilter}"]`);
  if(btn){ btn.click(); }
}

renderCards();
</script>
</body>
