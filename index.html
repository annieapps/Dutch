<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annie Leert Nederlands</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');
:root {
  --scheldt-blue: #294E72;
  --brothers-green: #016935;
  --croissant: #FFA500;
  --burgundy: #733B40;
  --castle-grey: #6B6B6B;
  --charcoal: #1c1d24;
  --north-country: #A6C5EA;
  --glencoe: #C0BF87;
  --bitten-croissant: #F3D6B0;
  --thistle: #D8BFD8;
  --oat-milk: #F6F7F6;
  --fog: #CBCAD0;
  --bg: #F6F7F6;
  --surface: #ffffff;
  --border: #CBCAD0;
  --ink: #1c1d24;
  --muted: #6B6B6B;
  --accent: #294E72;
  --accent-light: #A6C5EA;
  --gold: #FFA500;
  --gold-pale: #F3D6B0;
  --green: #016935;
  --green-pale: #C0BF87;
  --burgundy-pale: #D8BFD8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.5;
}

/* ── HEADER ── */
header {
  background: var(--charcoal);
  color: var(--oat-milk);
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 20% 50%, rgba(41,78,114,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 70% at 80% 40%, rgba(115,59,64,0.18) 0%, transparent 70%);
  pointer-events: none;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.9rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  position: relative;
  color: var(--oat-milk);
}
header h1 em { color: var(--north-country); font-style: italic; }
.header-sub {
  margin-top: 0.6rem;
  font-size: 0.82rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--fog);
  font-weight: 400;
  position: relative;
}
.header-tagline {
  margin-top: 1rem;
  font-size: 0.93rem;
  color: var(--bitten-croissant);
  font-style: italic;
  font-family: 'Playfair Display', serif;
  position: relative;
  font-weight: 400;
}

/* ── MODE SWITCHER ── */
.mode-switcher {
  background: var(--charcoal);
  padding: 0 2rem 1.5rem;
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  position: relative;
}
.mode-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--fog);
  padding: 0.4rem 1.2rem;
  border-radius: 2rem;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.18s;
  font-weight: 400;
  letter-spacing: 0.05em;
}
.mode-btn:hover { border-color: var(--north-country); color: var(--north-country); }
.mode-btn.active {
  background: var(--scheldt-blue);
  color: var(--oat-milk);
  border-color: var(--scheldt-blue);
  font-weight: 600;
}

/* ── CONTROLS ── */
.controls-wrap {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(28,29,36,0.06);
}
.controls {
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
  padding: 0.9rem 2rem;
  max-width: 1140px;
  margin: 0 auto;
  align-items: center;
}
.filter-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  font-weight: 600;
  margin-right: 0.4rem;
  flex-shrink: 0;
}
.filter-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  padding: 0.3rem 0.85rem;
  border-radius: 2rem;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.18s;
  font-weight: 400;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--scheldt-blue); color: var(--scheldt-blue); background: rgba(166,197,234,0.12); }
.filter-btn.active { background: var(--scheldt-blue); color: var(--oat-milk); border-color: var(--scheldt-blue); font-weight: 600; }

/* ── COUNT ── */
.count {
  text-align: center;
  color: var(--muted);
  font-size: 0.78rem;
  padding: 0.9rem 2rem 0.4rem;
  max-width: 1140px;
  margin: 0 auto;
  letter-spacing: 0.06em;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.1rem;
  padding: 1rem 2rem 3.5rem;
  max-width: 1140px;
  margin: 0 auto;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 1.3rem 1.4rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  animation: fadeUp 0.3s ease both;
  border-left-width: 4px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.card:hover { box-shadow: 0 4px 18px rgba(41,78,114,0.10); transform: translateY(-2px); }

.card[data-primary="word-order"] { border-left-color: var(--scheldt-blue); }
.card[data-primary="negative"]   { border-left-color: var(--burgundy); }
.card[data-primary="tense"]      { border-left-color: var(--brothers-green); }
.card[data-primary="modal"]      { border-left-color: var(--croissant); }
.card[data-primary="question"]   { border-left-color: var(--castle-grey); }
.card[data-primary="clause"]     { border-left-color: #5c1f26; }
.card[data-primary="preposition"]{ border-left-color: #014d27; }
.card[data-primary="adjective"]  { border-left-color: #1a3a5c; }
.card[data-primary="pronoun"]    { border-left-color: #6b3fa0; }
.card[data-primary="verb"]       { border-left-color: #8b4513; }

/* ── TAGS ── */
.card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.tag {
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  padding: 0.18rem 0.52rem;
  border-radius: 3px;
  background: var(--bg);
  color: var(--muted);
  border: 1px solid var(--border);
}
.tag.word-order  { background: rgba(166,197,234,0.30); color: var(--scheldt-blue);   border-color: rgba(41,78,114,0.25); }
.tag.negative    { background: rgba(216,191,216,0.35); color: var(--burgundy);        border-color: rgba(115,59,64,0.25); }
.tag.tense       { background: rgba(192,191,135,0.35); color: var(--brothers-green); border-color: rgba(1,105,53,0.25); }
.tag.modal       { background: rgba(243,214,176,0.50); color: #7a4a10;               border-color: rgba(255,165,0,0.35); }
.tag.question    { background: rgba(203,202,208,0.45); color: #2e2e3a;               border-color: rgba(107,107,107,0.30); }
.tag.clause      { background: rgba(115,59,64,0.10);   color: #5c1f26;               border-color: rgba(115,59,64,0.22); }
.tag.preposition { background: rgba(1,105,53,0.10);    color: #014d27;               border-color: rgba(1,105,53,0.22); }
.tag.adjective   { background: rgba(41,78,114,0.10);   color: #1a3a5c;               border-color: rgba(41,78,114,0.22); }
.tag.pronoun     { background: rgba(107,63,160,0.12);  color: #6b3fa0;               border-color: rgba(107,63,160,0.25); }
.tag.verb        { background: rgba(139,69,19,0.10);   color: #7a3a0a;               border-color: rgba(139,69,19,0.25); }

.rule-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  color: var(--muted);
  margin-top: 0.05rem;
}
.dutch {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--charcoal);
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.english {
  font-size: 0.88rem;
  color: var(--castle-grey);
  font-style: italic;
  font-weight: 400;
}
.explanation {
  font-size: 0.86rem;
  color: #3a3a44;
  line-height: 1.65;
  font-weight: 400;
  border-top: 1px solid var(--border);
  padding-top: 0.6rem;
  margin-top: 0.1rem;
}
.hl {
  background: var(--bitten-croissant);
  border-radius: 2px;
  padding: 0 3px;
  font-weight: 600;
  color: var(--charcoal);
  font-style: normal;
}

/* ── FLASHCARD MODE ── */
#flashcard-section { display: none; }
#browse-section { display: block; }

.flashcard-wrap {
  max-width: 620px;
  margin: 2.5rem auto;
  padding: 0 2rem 4rem;
}
.fc-progress-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.fc-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.fc-progress-fill {
  height: 100%;
  background: var(--scheldt-blue);
  border-radius: 2px;
  transition: width 0.35s ease;
}
.fc-score {
  font-size: 0.78rem;
  color: var(--muted);
  display: flex;
  gap: 0.8rem;
  flex-shrink: 0;
}
.fc-score span { font-weight: 600; }
.fc-score .correct { color: var(--brothers-green); }
.fc-score .wrong   { color: var(--burgundy); }

.flashcard {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  border-left-width: 5px;
  min-height: 280px;
  padding: 2rem 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  position: relative;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
  user-select: none;
}
.flashcard:hover { box-shadow: 0 6px 24px rgba(41,78,114,0.10); transform: translateY(-2px); }
.flashcard.revealed { cursor: default; }
.flashcard.revealed:hover { transform: none; }

.fc-hint {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  color: var(--muted);
  font-weight: 600;
}
.fc-rule {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  color: var(--muted);
}
.fc-english {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 400;
  font-style: italic;
  color: var(--charcoal);
  line-height: 1.4;
  flex: 1;
  display: flex;
  align-items: center;
}
.fc-answer {
  border-top: 1.5px solid var(--border);
  padding-top: 1rem;
  margin-top: 0.5rem;
  display: none;
  flex-direction: column;
  gap: 0.5rem;
  animation: fadeUp 0.25s ease;
}
.fc-answer.show { display: flex; }
.fc-dutch {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--charcoal);
  line-height: 1.45;
}
.fc-explanation {
  font-size: 0.84rem;
  color: #3a3a44;
  line-height: 1.65;
}
.fc-tap {
  text-align: center;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-top: auto;
  padding-top: 1rem;
}
.fc-tap.hide { opacity: 0; }

.fc-buttons {
  display: flex;
  gap: 0.8rem;
  margin-top: 1.4rem;
}
.fc-btn {
  flex: 1;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  border: 1.5px solid;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.fc-btn.correct-btn {
  background: rgba(1,105,53,0.07);
  border-color: rgba(1,105,53,0.3);
  color: var(--brothers-green);
}
.fc-btn.correct-btn:hover { background: rgba(1,105,53,0.15); }
.fc-btn.wrong-btn {
  background: rgba(115,59,64,0.07);
  border-color: rgba(115,59,64,0.3);
  color: var(--burgundy);
}
.fc-btn.wrong-btn:hover { background: rgba(115,59,64,0.15); }
.fc-btn.skip-btn {
  flex: 0 0 auto;
  padding: 0.75rem 1.2rem;
  background: transparent;
  border-color: var(--border);
  color: var(--muted);
  font-weight: 400;
}
.fc-btn.skip-btn:hover { border-color: var(--castle-grey); color: var(--ink); }
.fc-buttons.hidden { display: none; }

.fc-complete {
  text-align: center;
  padding: 3rem 1rem;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.fc-complete.show { display: flex; }
.fc-complete h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  color: var(--charcoal);
}
.fc-complete p { color: var(--muted); font-size: 0.95rem; }
.fc-stats {
  display: flex;
  gap: 2rem;
  margin: 0.5rem 0;
}
.fc-stat { text-align: center; }
.fc-stat .num {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  display: block;
}
.fc-stat .lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.fc-stat.c .num { color: var(--brothers-green); }
.fc-stat.w .num { color: var(--burgundy); }
.fc-restart {
  margin-top: 0.5rem;
  padding: 0.75rem 2rem;
  background: var(--scheldt-blue);
  color: var(--oat-milk);
  border: none;
  border-radius: 6px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}
.fc-restart:hover { background: #1e3d5c; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 1.8rem 2rem;
  color: var(--muted);
  font-size: 0.78rem;
  border-top: 1px solid var(--border);
  letter-spacing: 0.06em;
  font-style: italic;
}

@media (max-width: 600px) {
  .grid { padding: 0.8rem 1rem 2.5rem; gap: 0.9rem; }
  .controls { padding: 0.7rem 1rem; }
  header { padding: 2rem 1.2rem 1.8rem; }
  .flashcard-wrap { padding: 0 1rem 3rem; }
  .fc-english { font-size: 1.2rem; }
}
</style>
</head>
<body>

<header>
  <h1>Annie leert <em>Nederlands</em></h1>
  <p class="header-sub">A grammar guide through one love story</p>
  <p class="header-tagline">Antwerp is calling — one sentence at a time</p>
</header>

<div class="mode-switcher">
  <button class="mode-btn active" id="btn-browse" onclick="setMode('browse')">📖 Browse</button>
  <button class="mode-btn" id="btn-flashcard" onclick="setMode('flashcard')">🃏 Flashcards</button>
</div>

<div class="controls-wrap">
  <div class="controls">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="word-order">Word Order</button>
    <button class="filter-btn" data-filter="negative">Negation</button>
    <button class="filter-btn" data-filter="tense">Tenses</button>
    <button class="filter-btn" data-filter="modal">Modals</button>
    <button class="filter-btn" data-filter="question">Questions</button>
    <button class="filter-btn" data-filter="clause">Clauses</button>
    <button class="filter-btn" data-filter="preposition">Prepositions</button>
    <button class="filter-btn" data-filter="adjective">Adjectives</button>
    <button class="filter-btn" data-filter="verb">Verbs</button>
    <button class="filter-btn" data-filter="pronoun">Pronouns</button>
  </div>
</div>

<!-- BROWSE MODE -->
<div id="browse-section">
  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</div>

<!-- FLASHCARD MODE -->
<div id="flashcard-section">
  <div class="flashcard-wrap">
    <div class="fc-progress-row">
      <div class="fc-progress-bar"><div class="fc-progress-fill" id="fc-progress"></div></div>
      <div class="fc-score">
        <span class="correct" id="fc-correct">0 ✓</span>
        <span class="wrong" id="fc-wrong">0 ✗</span>
        <span id="fc-counter">0 / 0</span>
      </div>
    </div>

    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="fc-rule" id="fc-rule"></div>
      <div class="fc-english" id="fc-english"></div>
      <div class="fc-answer" id="fc-answer">
        <div class="fc-dutch" id="fc-dutch"></div>
        <div class="fc-explanation" id="fc-explanation"></div>
      </div>
      <div class="fc-tap" id="fc-tap">Tap to reveal Dutch →</div>
    </div>

    <div class="fc-buttons hidden" id="fc-buttons">
      <button class="fc-btn wrong-btn" onclick="markCard(false)">✗ &nbsp;Didn't know</button>
      <button class="fc-btn skip-btn" onclick="nextCard()">Skip</button>
      <button class="fc-btn correct-btn" onclick="markCard(true)">✓ &nbsp;Got it</button>
    </div>

    <div class="fc-complete" id="fc-complete">
      <div style="font-size:2.5rem">🌷</div>
      <h2>Goed gedaan!</h2>
      <div class="fc-stats">
        <div class="fc-stat c"><span class="num" id="final-correct">0</span><span class="lbl">Correct</span></div>
        <div class="fc-stat w"><span class="num" id="final-wrong">0</span><span class="lbl">To review</span></div>
      </div>
      <p id="fc-msg"></p>
      <button class="fc-restart" onclick="restartFlashcards()">Opnieuw →</button>
    </div>
  </div>
</div>

<footer>Veel succes, lieve Annie 🌷 — Antwerpen wacht op je</footer>

<script>
const sentences = [
// ── WORD ORDER ──────────────────────────────────────────────────────────────
{
  tags: ["word-order"],
  rule: "Basic SVO — Subject Verb Object",
  dutch: "Annie leert Nederlands.",
  english: "Annie learns Dutch.",
  explanation: "Dutch follows Subject–Verb–Object order, just like English. The verb <span class='hl'>leert</span> (learns) sits in position 2.",
},
{
  tags: ["word-order"],
  rule: "V2 Rule — Verb stays in position 2 (simple verb)",
  dutch: "Omdat ze oefent, leert Annie Nederlands.",
  english: "Because she practises, Annie learns Dutch.",
  explanation: "When a subordinate clause opens the sentence, the main verb <span class='hl'>leert</span> must still land in position 2 — so subject Annie is pushed after it. With a simple verb in the subordinate clause, the V2 pattern in the main clause is easy to see.",
},
{
  tags: ["word-order", "clause"],
  rule: "V2 Rule — Verb stays in position 2 (phrasal verb)",
  dutch: "Omdat ze van hem houdt, leert Annie Nederlands.",
  english: "Because she loves him, Annie learns Dutch.",
  explanation: "When a subordinate clause opens the sentence, the main verb <span class='hl'>leert</span> must still land in position 2 — so subject Annie is pushed after it. This is the famous Dutch V2 rule.",
},
{
  tags: ["word-order"],
  rule: "Time adverb — V2 inversion",
  dutch: "Elke dag oefent Annie haar Nederlands.",
  english: "Every day Annie practises her Dutch.",
  explanation: "<span class='hl'>Elke dag</span> (every day) is placed first for emphasis. The verb <span class='hl'>oefent</span> must stay in position 2, so the subject Annie shifts to position 3.",
},
{
  tags: ["word-order"],
  rule: "Place adverb — V2 inversion",
  dutch: "In Antwerpen spreekt Annie Nederlands met zijn familie.",
  english: "In Antwerp, Annie speaks Dutch with his family.",
  explanation: "The place phrase <span class='hl'>In Antwerpen</span> takes position 1. The verb <span class='hl'>spreekt</span> locks into position 2, pushing the subject to position 3.",
},
{
  tags: ["word-order"],
  rule: "Time-Manner-Place order",
  dutch: "Annie bezoekt hem elke maand blij in Antwerpen.",
  english: "Annie visits him happily in Antwerp every month.",
  explanation: "Dutch prefers the order Time → Manner → Place for adverbials: <span class='hl'>elke maand</span> (time), <span class='hl'>blij</span> (manner), <span class='hl'>in Antwerpen</span> (place).",
},
{
  tags: ["word-order", "clause"],
  rule: "Subordinate clause — verb to the end",
  dutch: "Annie weet dat haar vriend Antwerps is.",
  english: "Annie knows that her boyfriend is from Antwerp.",
  explanation: "In a subordinate clause introduced by <span class='hl'>dat</span>, the verb is kicked to the very end. Main clause order is SVO; subordinate clause order is SOV.",
},
{
  tags: ["word-order", "clause"],
  rule: "omdat — verb-final (simple verb)",

// ── FILTER STATE ──
let activeFilter = 'all';
let currentMode = 'browse';

function getFiltered() {
  if (activeFilter === 'all') return sentences;
  return sentences.filter(s => s.tags.includes(activeFilter));
}

// ── BROWSE MODE ──
function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${filtered.length} sentence${filtered.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';
  filtered.forEach((s, i) => {
    const primary = s.tags[0];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.primary = primary;
    card.style.animationDelay = `${i * 0.03}s`;
    card.innerHTML = `
      <div class="card-tags">${s.tags.map(t => `<span class="tag ${t}">${t.replace('-', ' ')}</span>`).join('')}</div>
      <div class="rule-label">${s.rule}</div>
      <div class="dutch">${s.dutch}</div>
      <div class="english">${s.english}</div>
      <div class="explanation">${s.explanation}</div>
    `;
    grid.appendChild(card);
  });
}

// ── FLASHCARD STATE ──
let fcDeck = [];
let fcIndex = 0;
let fcCorrect = 0;
let fcWrong = 0;
let fcRevealed = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startFlashcards() {
  fcDeck = shuffle(getFiltered());
  fcIndex = 0;
  fcCorrect = 0;
  fcWrong = 0;
  document.getElementById('fc-complete').classList.remove('show');
  document.getElementById('flashcard').style.display = 'flex';
  document.getElementById('fc-buttons').style.display = 'flex';
  updateScoreDisplay();
  showCard();
}

function showCard() {
  if (fcIndex >= fcDeck.length) {
    showComplete();
    return;
  }
  const s = fcDeck[fcIndex];
  fcRevealed = false;

  const card = document.getElementById('flashcard');
  card.className = 'flashcard';
  card.style.borderLeftColor = getBorderColor(s.tags[0]);

  document.getElementById('fc-rule').textContent = s.rule;
  document.getElementById('fc-english').textContent = s.english;
  document.getElementById('fc-dutch').innerHTML = s.dutch;
  document.getElementById('fc-explanation').innerHTML = s.explanation;

  document.getElementById('fc-answer').classList.remove('show');
  document.getElementById('fc-tap').classList.remove('hide');
  document.getElementById('fc-buttons').classList.add('hidden');

  updateProgress();
}

function getBorderColor(tag) {
  const map = {
    'word-order': '#294E72',
    'negative': '#733B40',
    'tense': '#016935',
    'modal': '#FFA500',
    'question': '#6B6B6B',
    'clause': '#5c1f26',
    'preposition': '#014d27',
    'adjective': '#1a3a5c',
    'pronoun': '#6b3fa0',
    'verb': '#8b4513',
  };
  return map[tag] || '#CBCAD0';
}

function revealCard() {
  if (fcRevealed) return;
  fcRevealed = true;
  document.getElementById('flashcard').classList.add('revealed');
  document.getElementById('fc-answer').classList.add('show');
  document.getElementById('fc-tap').classList.add('hide');
  document.getElementById('fc-buttons').classList.remove('hidden');
}

function markCard(correct) {
  if (!fcRevealed) return;
  if (correct) fcCorrect++; else fcWrong++;
  fcIndex++;
  updateScoreDisplay();
  showCard();
}

function nextCard() {
  fcIndex++;
  showCard();
}

function updateScoreDisplay() {
  document.getElementById('fc-correct').textContent = `${fcCorrect} ✓`;
  document.getElementById('fc-wrong').textContent = `${fcWrong} ✗`;
  document.getElementById('fc-counter').textContent = `${fcIndex} / ${fcDeck.length}`;
}

function updateProgress() {
  const pct = fcDeck.length ? (fcIndex / fcDeck.length) * 100 : 0;
  document.getElementById('fc-progress').style.width = pct + '%';
  document.getElementById('fc-counter').textContent = `${fcIndex} / ${fcDeck.length}`;
}

function showComplete() {
  document.getElementById('flashcard').style.display = 'none';
  document.getElementById('fc-buttons').style.display = 'none';
  document.getElementById('fc-progress').style.width = '100%';

  document.getElementById('final-correct').textContent = fcCorrect;
  document.getElementById('final-wrong').textContent = fcWrong;

  const pct = fcDeck.length ? Math.round((fcCorrect / fcDeck.length) * 100) : 0;
  let msg = '';
  if (pct === 100) msg = 'Perfect score! Geweldig! 🌟';
  else if (pct >= 80) msg = 'Uitstekend! Almost there.';
  else if (pct >= 60) msg = 'Goed bezig! Keep practising.';
  else msg = 'Blijf oefenen — je komt er!';
  document.getElementById('fc-msg').textContent = msg;
  document.getElementById('fc-complete').classList.add('show');
}

function restartFlashcards() {
  document.getElementById('flashcard').style.display = 'flex';
  document.getElementById('fc-buttons').style.display = 'flex';
  startFlashcards();
}

// ── MODE SWITCHING ──
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-browse').classList.toggle('active', mode === 'browse');
  document.getElementById('btn-flashcard').classList.toggle('active', mode === 'flashcard');
  document.getElementById('browse-section').style.display = mode === 'browse' ? 'block' : 'none';
  document.getElementById('flashcard-section').style.display = mode === 'flashcard' ? 'block' : 'none';
  document.querySelector('.controls-wrap').style.display = 'block';

  if (mode === 'flashcard') {
    startFlashcards();
  }
}

// ── FILTER BUTTONS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    if (currentMode === 'browse') renderCards();
    else startFlashcards();
  });
});

// ── INIT ──
renderCards();
</script>
